<svg xmlns="http://www.w3.org/2000/svg" width="2100" height="1200" viewBox="0 0 2100 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07141d"/>
      <stop offset="0.55" stop-color="#081923"/>
      <stop offset="1" stop-color="#041017"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#37a9db"/>
      <stop offset="1" stop-color="#ffbd4a"/>
    </linearGradient>
    <clipPath id="portraitClip">
      <circle cx="1585" cy="345" r="178"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <style>
      .font { font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #a9bdc9; }
      .white { fill: #f3fbff; }
      .blue { fill: #7fd4ff; }
      .yellow { fill: #ffbd4a; }
      .cardline { stroke: rgba(173,225,249,.2); stroke-width: 2; fill: none; }
      .small { font-size: 34px; letter-spacing: .04em; font-weight: 700; }
      .body { font-size: 38px; }
      .name { font-size: 82px; font-weight: 900; letter-spacing: -1px; }
      .phone { font-size: 96px; font-weight: 900; letter-spacing: -1px; }
      .label { font-size: 28px; font-weight: 800; letter-spacing: .12em; }
    </style>
  </defs>

  <rect width="2100" height="1200" rx="58" fill="url(#bg)"/>
  <path d="M0 0h2100v1200H0z" fill="none" stroke="#163142" stroke-width="8"/>
  <circle cx="1820" cy="130" r="360" fill="#37a9db" opacity=".16"/>
  <circle cx="172" cy="1070" r="300" fill="#ffbd4a" opacity=".10"/>
  <path d="M130 960 C480 790 840 1110 1200 900 S1740 810 1990 1010" stroke="#37a9db" stroke-width="8" opacity=".24" fill="none"/>

  <g transform="translate(125 115)">
    <rect width="1850" height="970" rx="42" fill="rgba(255,255,255,.045)" stroke="rgba(173,225,249,.18)" stroke-width="3"/>
  </g>

  <g class="font">
    <g transform="translate(180 175)">
      <rect width="118" height="118" rx="28" fill="rgba(255,255,255,.07)" stroke="rgba(173,225,249,.18)" stroke-width="3"/>
      <path d="M59 22c22 28 36 50 36 76a36 36 0 0 1-72 0c0-26 14-48 36-76z" fill="none" stroke="#7fd4ff" stroke-width="8"/>
      <path d="M35 86c16-16 35 14 55-8" fill="none" stroke="#ffbd4a" stroke-width="8" stroke-linecap="round"/>
    </g>

    <text x="330" y="220" class="small blue">DOBAI VÍZ &amp; FŰTÉS MESTER</text>
    <text x="180" y="390" class="name white">Dobai István</text>
    <text x="184" y="455" class="body muted">vízszerelő • fűtésszerelő • otthoni szerelés</text>

    <rect x="180" y="525" width="980" height="176" rx="30" fill="url(#accent)" filter="url(#shadow)"/>
    <rect x="218" y="556" width="250" height="42" rx="21" fill="rgba(6,19,27,.16)"/>
    <text x="246" y="586" class="label" fill="#061017" style="font-size:24px;letter-spacing:.1em">HÍVJON MOST</text>
    <text x="224" y="670" class="phone" fill="#061017" style="font-size:88px">+36 30 482 7196</text>

    <text x="184" y="790" class="body white">Vízszerelés • Duguláselhárítás • Fürdőszoba</text>
    <text x="184" y="848" class="body white">Padlófűtés • Falfűtés • Kazán beépítés</text>
    <text x="184" y="906" class="body white">Bútor összeszerelés</text>

    <line x1="180" y1="950" x2="1120" y2="950" stroke="rgba(173,225,249,.22)" stroke-width="3"/>
    <text x="184" y="1018" class="body muted">dobai.istvan.szereles@gmail.com</text>
    <text x="184" y="1072" class="body muted">Budapest és környéke • 20 év tapasztalat</text>

    <circle cx="1585" cy="345" r="190" fill="rgba(255,255,255,.08)" stroke="rgba(173,225,249,.22)" stroke-width="4"/>
    <image href="assets/dobai-istvan-portrait.png" x="1407" y="167" width="356" height="356" preserveAspectRatio="xMidYMid slice" clip-path="url(#portraitClip)"/>
    <circle cx="1585" cy="345" r="178" class="cardline"/>

    <g transform="translate(1300 625)">
      <rect width="570" height="310" rx="30" fill="rgba(255,255,255,.06)" stroke="rgba(173,225,249,.18)" stroke-width="3"/>
      <text x="42" y="76" class="label yellow">RÖVIDEN</text>
      <text x="42" y="140" class="body white">Gyors hibajavítás,</text>
      <text x="42" y="194" class="body white">átgondolt kivitelezés,</text>
      <text x="42" y="248" class="body white">tiszta átadás.</text>
    </g>
  </g>
</svg>
