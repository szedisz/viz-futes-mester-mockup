<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dobai István névjegykártya</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #07141d;
      font-family: Arial, Helvetica, sans-serif;
      color: #f3fbff;
      padding: 32px;
    }
    .wrap {
      width: min(1050px, 100%);
    }
    img {
      width: 100%;
      display: block;
      border-radius: 24px;
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    p {
      color: #a9bdc9;
      margin: 18px 0 0;
      line-height: 1.5;
    }
    a {
      color: #ffbd4a;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="dobai-istvan-nevjegy.svg" alt="Dobai István névjegykártya terv">
    <p>Fiktív telefonszám és email szerepel rajta. A telefonszám direkt a legerősebb elem.</p>
    <p><a href="dobai-istvan-nevjegy.svg">SVG megnyitása</a></p>
  </main>
</body>
</html>
